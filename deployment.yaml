apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-similarity-deployment
  labels:
    app: product-similarity
spec:
  replicas: 3
  selector:
    matchLabels:
      app: product-similarity
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-similarity
    spec:
      containers:
      - name: product-similarity-app
        image: sap-product-similarity:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1.0"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        env:
        - name: NAME
          value: "ProductSimilarityApp"
---
apiVersion: v1
kind: Service
metadata:
  name: product-similarity-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: product-similarity
